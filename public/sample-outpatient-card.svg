<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1100" width="800" height="1100">
  <!--
    Mock outpatient card used by the partner portal's "Try the API"
    button. Realistic enough that the extraction pipeline produces a
    meaningful Patient + Observation + MedicationRequest bundle, but
    fictional so we never expose real patient data.
  -->
  <defs>
    <style>
      .body { font-family: 'Inter', system-ui, sans-serif; font-size: 18px; fill: #0A1F1B; }
      .label { font-family: 'Inter', system-ui, sans-serif; font-size: 12px; fill: #555; text-transform: uppercase; letter-spacing: 0.12em; font-weight: 600; }
      .value { font-family: 'Inter', system-ui, sans-serif; font-size: 18px; fill: #0A1F1B; }
      .hand { font-family: 'Caveat', 'Bradley Hand', cursive; font-size: 24px; fill: #1a1a4d; }
      .title { font-family: 'Inter', system-ui, sans-serif; font-size: 24px; font-weight: 700; fill: #0A1F1B; letter-spacing: 0.04em; }
      .subtitle { font-family: 'Inter', system-ui, sans-serif; font-size: 13px; fill: #444; }
    </style>
  </defs>

  <!-- Page -->
  <rect width="800" height="1100" fill="#fbf9f3"/>

  <!-- Header band -->
  <rect x="0" y="0" width="800" height="120" fill="#0A7C6E"/>
  <text x="50" y="55" class="title" fill="#ffffff">LAGOON MEMORIAL HOSPITAL</text>
  <text x="50" y="80" class="subtitle" fill="#cdefe5">14 Marina Road, Lagos Island · +234 1 555 0142</text>
  <text x="50" y="100" class="subtitle" fill="#cdefe5">OUTPATIENT CARD</text>

  <!-- MRN block -->
  <rect x="500" y="20" width="270" height="80" rx="4" fill="#ffffff" stroke="#0A1F1B" stroke-width="1.5"/>
  <text x="515" y="42" class="label">MRN</text>
  <text x="515" y="70" class="value" style="font-weight: 700; font-size: 22px;">LH-00143-26</text>
  <text x="515" y="90" class="subtitle">Issued: 14 / 03 / 2026</text>

  <!-- Patient identification block -->
  <g transform="translate(50, 160)">
    <text class="label" y="0">PATIENT</text>
    <line x1="0" y1="8" x2="700" y2="8" stroke="#0A1F1B" stroke-width="1"/>

    <text class="label" y="40">Full name</text>
    <text class="hand" x="0" y="72">Adaeze Margaret Nwosu</text>

    <text class="label" x="380" y="40">Sex</text>
    <text class="hand" x="380" y="72">Female</text>

    <text class="label" y="110">Date of birth</text>
    <text class="hand" x="0" y="142">14 / 03 / 1985</text>

    <text class="label" x="200" y="110">Age</text>
    <text class="hand" x="200" y="142">41</text>

    <text class="label" x="380" y="110">Blood group</text>
    <text class="hand" x="380" y="142">O+</text>

    <text class="label" x="560" y="110">Genotype</text>
    <text class="hand" x="560" y="142">AA</text>

    <text class="label" y="180">Phone</text>
    <text class="hand" x="0" y="212">+234 803 555 1208</text>

    <text class="label" x="380" y="180">Next of kin</text>
    <text class="hand" x="380" y="212">Chidi Nwosu (Husband)</text>

    <text class="label" y="250">Address</text>
    <text class="hand" x="0" y="282">22 Akin Adesola Street, Victoria Island</text>
  </g>

  <!-- Visit block -->
  <g transform="translate(50, 490)">
    <text class="label" y="0">VISIT — 05 JUNE 2026</text>
    <line x1="0" y1="8" x2="700" y2="8" stroke="#0A1F1B" stroke-width="1"/>

    <text class="label" y="40">Chief complaint</text>
    <text class="hand" x="0" y="72">Persistent headache and dizziness for 5 days</text>

    <text class="label" y="110">Vitals</text>
    <text class="hand" x="0" y="142">BP 138 / 92 mmHg · HR 84 bpm · Temp 36.8°C · Wt 64 kg</text>

    <text class="label" y="180">Examination</text>
    <text class="hand" x="0" y="212">Patient alert, conscious. No neurological deficit.</text>
    <text class="hand" x="0" y="242">Tongue moist. Heart sounds S1 + S2, no murmurs.</text>

    <text class="label" y="280">Diagnosis</text>
    <text class="hand" x="0" y="312">Stage 1 hypertension (ICD-10: I10)</text>

    <text class="label" y="350">Plan</text>
    <text class="hand" x="0" y="382">Start Amlodipine 5 mg OD x 30 days</text>
    <text class="hand" x="0" y="412">Lifestyle counselling — low salt, daily walks</text>
    <text class="hand" x="0" y="442">Review in 2 weeks for BP recheck</text>
  </g>

  <!-- Signature block -->
  <g transform="translate(50, 990)">
    <line x1="0" y1="0" x2="300" y2="0" stroke="#0A1F1B" stroke-width="1"/>
    <text class="label" y="20">Attending physician</text>
    <text class="hand" x="0" y="-10" style="font-size: 28px;">Dr. Tunde Adeleke</text>
  </g>

  <g transform="translate(500, 990)">
    <line x1="0" y1="0" x2="250" y2="0" stroke="#0A1F1B" stroke-width="1"/>
    <text class="label" y="20">License #</text>
    <text class="hand" x="0" y="-10">MDCN/R/45219</text>
  </g>
</svg>
